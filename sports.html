<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudCart — Sports Accessories</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #2a2a38;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      text-decoration: none;
    }

    .search-bar {
      flex: 1;
      max-width: 480px;
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 9px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 14px;
      color: var(--muted);
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }
    .nav-links a:hover { color: var(--white); background: var(--surface2); }

    .cart-btn {
      position: relative;
      background: var(--surface2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      font-size: 18px !important;
    }
    #cart-count {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .cat-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .cat-nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }
    .cat-nav-inner a {
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .cat-nav-inner a:hover { color: var(--white); border-bottom-color: var(--accent); }
    .cat-nav-inner a.active { color: var(--white); border-bottom-color: var(--accent); }

    .cat-banner {
      max-width: 1400px;
      margin: 32px auto 0;
      padding: 0 28px;
    }
    .cat-banner-inner {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 56px;
      position: relative;
      overflow: hidden;
    }
    .cat-banner-inner::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,252,.22) 0%, transparent 70%);
    }
    .cat-banner-inner::after {
      content: '';
      position: absolute;
      bottom: -40px; left: 30%;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(252,92,125,.13) 0%, transparent 70%);
    }
    .cat-banner-content { position: relative; z-index: 1; }
    .cat-tag {
      display: inline-block;
      background: rgba(124,92,252,.2);
      border: 1px solid rgba(124,92,252,.4);
      color: #a887ff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .cat-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(40px, 5vw, 68px);
      line-height: 0.95;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 12px;
    }
    .cat-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cat-sub {
      color: var(--muted);
      font-size: 15px;
      max-width: 380px;
    }

    .section-header {
      max-width: 1400px;
      margin: 48px auto 20px;
      padding: 0 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--white);
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .product-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(124,92,252,.5);
      box-shadow: 0 16px 40px rgba(0,0,0,.4);
    }

    .product-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface2);
    }
    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .35s;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.06); }

    .product-info { padding: 14px 16px 16px; }
    .product-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
    }
    .product-price span {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
    }

    .add-btn {
      margin-top: 12px;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #5a3cd4);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-btn:hover { opacity: .88; }
    .add-btn:active { transform: scale(.97); }

    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all .35s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 28px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    footer span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <nav>
    <a href="home.html" class="logo">BudCart</a>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()">
      <button>🔍</button>
    </div>
    <div class="nav-links">
      <a href="home.html">Products</a>
      <a href="#">About</a>
      <a href="form.html">Contact</a>
      <a href="logout.html">Logout</a>
      <a href="cart.html" class="cart-btn" style="font-size:18px; padding:6px 12px; border-radius:6px; position:relative;">
        🛒 <span id="cart-count">0</span>
      </a>
    </div>
  </nav>
</header>

<div class="cat-nav">
  <div class="cat-nav-inner">
    <a href="clothing.html" class="">👗 Fashion</a>
    <a href="electronics.html" class="">📱 Electronics</a>
    <a href="appliance.html" class="">🏠 Home Appliances</a>
    <a href="sports.html" class="active">⚽ Sports</a>
    <a href="food.html" class="">🍎 Food Items</a>
  </div>
</div>

<div class="cat-banner">
  <div class="cat-banner-inner" style="background: linear-gradient(135deg, #0d1f2e 0%, #0a2010 50%, #1a1510 100%);">
    <div class="cat-banner-content">
      <div class="cat-tag">🏆 Top Picks</div>
      <h1 class="cat-title">Sports <span>Accessories</span></h1>
      <p class="cat-sub">Gear up for performance — sport, fitness, and beyond.</p>
    </div>
  </div>
</div>

<div class="section-header" id="products">
  <div class="section-title">Sports Accessories</div>
  <div class="section-line"></div>
</div>

<div class="product-grid" id="product-grid"></div>

<footer>
  © 2025 <span>BudCart</span> — All rights reserved.
</footer>

<div id="toast"></div>

<script>
const products = [{"name": "Ball", "price": 1, "img": "https://images.unsplash.com/photo-1510697963685-53101e615777?q=80&w=600&auto=format&fit=crop"}, {"name": "Football Kit", "price": 25, "img": "https://plus.unsplash.com/premium_photo-1682435566673-cedb75cd7459?q=80&w=600&auto=format&fit=crop"}, {"name": "Basketball", "price": 7, "img": "https://images.unsplash.com/photo-1567113379515-6e85e7168eb1?q=80&w=600&auto=format&fit=crop"}, {"name": "Dumbell", "price": 8, "img": "https://plus.unsplash.com/premium_photo-1670505059783-228b77d8df17?q=80&w=600&auto=format&fit=crop"}, {"name": "Helmet", "price": 12, "img": "https://images.unsplash.com/photo-1605050825345-39bfc6eced70?q=80&w=600&auto=format&fit=crop"}, {"name": "Racket", "price": 38, "img": "https://images.unsplash.com/photo-1759819598850-8783b8aaf7a8?q=80&w=600&auto=format&fit=crop"}, {"name": "Protein Powder", "price": 40, "img": "https://images.unsplash.com/photo-1693996045899-7cf0ac0229c7?q=80&w=600&auto=format&fit=crop"}, {"name": "Creatine", "price": 22, "img": "https://images.unsplash.com/photo-1693996046514-0406d0773a7d?q=80&w=600&auto=format&fit=crop"}];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function updateCartCount() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = count;
}

function addToCart(name, price, img) {
  const idx = cart.findIndex(i => i.name === name);
  if (idx > -1) {
    cart[idx].qty++;
    cart[idx].totalPrice += price;
  } else {
    cart.push({ name, price, img, qty: 1, totalPrice: price });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  showToast(name);
}

function showToast(name) {
  const t = document.getElementById('toast');
  t.textContent = `✅ ${name} added to cart!`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderProducts(list) {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">$${p.price} <span>/ item</span></div>
        <button class="add-btn" onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">
          + Add to Cart
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
}

renderProducts(products);
updateCartCount();
</script>
</body>
</html>
